<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Dance Challenge 2026</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#050505;
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  padding:40px 20px 20px;
}

.header img{
  height:90px;
  margin-bottom:15px;
}

.association{
  font-size:14px;
  letter-spacing:4px;
  color:#bdbdbd;
  margin-bottom:20px;
  text-transform:uppercase;
}

h1{
  font-size:34px;
  margin:0;
  letter-spacing:2px;
  text-transform:uppercase;
}

.subtitle{
  margin-top:15px;
  font-size:18px;
  color:#25e3d1;
  line-height:1.5;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition:.3s;
}

.gallery img:hover{
  transform:scale(1.03);
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:40px 20px;
  background:#000;
}

footer h2{
  font-size:14px;
  letter-spacing:4px;
  color:#aaa;
  margin-bottom:30px;
  text-transform:uppercase;
}

.sponsors{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}

.sponsors img{
  height:55px;
}

.bottom-note{
  margin-top:25px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="header">
  <img src="LOGO-ESPRIT.PNG">
  <div class="association">Association Esprit Du Cercle</div>

  <h1>Swiss Dance Challenge 2026</h1>

  <div class="subtitle">
    Next : Martigny du 24 au 26 avril<br>
    9 mai Neuchâtel • 16 mai Sion • 24 mai Fribourg
  </div>
</div>

<!-- PHOTOS -->
<div class="gallery">
  <img src="IMG_8452.jpeg">
  <img src="IMG_8456.jpeg">
  <img src="IMG_8457.jpeg">
  <img src="IMG_8458.jpeg">
  <img src="IMG_8459.jpeg">
  <img src="IMG_8460.jpeg">
  <img src="IMG_8461.jpeg">
  <img src="IMG_8464.jpeg">
</div>

<footer>

  <h2>Official Partners</h2>

  <div class="sponsors">
    <img src="LOGO-LOTERIE.jpg">
    <img src="Logo-Vevey-Ville.png">
    <img src="LOGO-SION-CAPITAL.png">
    <img src="LOGO-DELEMONT.png">
    <img src="LOGO-NEUCHATEL.png">
    <img src="logo-MARTIGNY.jpg">
    <img src="LOGO-CULTURE.PNG">
    <img src="LOGOBOY.png">
  </div>

  <div class="bottom-note">
    espritducercle.ch
  </div>

</footer>

</body>
</html>
