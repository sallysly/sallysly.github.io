<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Dance Challenge 2026</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#050505;
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  padding:40px 20px 20px;
}

.header img{
  height:90px;
  margin-bottom:15px;
}

.association{
  font-size:14px;
  letter-spacing:4px;
  color:#bdbdbd;
  margin-bottom:20px;
  text-transform:uppercase;
}

h1{
  font-size:34px;
  margin:0;
  letter-spacing:2px;
  text-transform:uppercase;
}

.subtitle{
  margin-top:15px;
  font-size:18px;
  color:#25e3d1;
  line-height:1.5;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:15px;
  object-fit:cover;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  opacity:0;
  transform:scale(0.9);
  transition:all 0.8s ease;
}

.gallery img.show{
  opacity:1;
  transform:scale(1);
}

.gallery img:hover{
  transform:scale(1.05);
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:40px 20px;
  background:#000;
}

footer h2{
  font-size:14px;
  letter-spacing:4px;
  color:#aaa;
  margin-bottom:30px;
  text-transform:uppercase;
}

.sponsors{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
}

.sponsors img{
  height:55px;
}

.bottom-note{
  margin-top:25px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="header">
  <img src="LOGO-ESPRIT.PNG" alt="Association Esprit du Cercle">
  <div class="association">Association Esprit Du Cercle</div>

  <h1>Swiss Dance Challenge 2026</h1>

  <div class="subtitle">
    Next : Martigny du 24 au 26 avril<br>
    9 mai Neuchâtel • 16 mai Sion • 24 mai Fribourg
  </div>
</div>

<div class="gallery">
  <img src="IMG_8452.jpeg" alt="Swiss Dance Challenge photo 1">
  <img src="IMG_8456.jpeg" alt="Swiss Dance Challenge photo 2">
  <img src="IMG_8457.jpeg" alt="Swiss Dance Challenge photo 3">
  <img src="IMG_8458.jpeg" alt="Swiss Dance Challenge photo 4">
  <img src="IMG_8459.jpeg" alt="Swiss Dance Challenge photo 5">
  <img src="IMG_8460.jpeg" alt="Swiss Dance Challenge photo 6">
  <img src="IMG_8461.jpeg" alt="Swiss Dance Challenge photo 7">
  <img src="IMG_8464.jpeg" alt="Swiss Dance Challenge photo 8">
</div>

<footer>

  <h2>Official Partners</h2>

  <div class="sponsors">
    <img src="LOGO-LOTERIE.jpg" alt="Loterie Romande">
    <img src="Logo-Vevey-Ville.png" alt="Vevey Ville d'Images">
    <img src="LOGO-SION-CAPITAL.png" alt="Sion Capital">
    <img src="LOGO-DELEMONT.png" alt="Delémont">
    <img src="LOGO-NEUCHATEL.png" alt="Neuchâtel">
    <img src="logo-MARTIGNY.jpg" alt="Martigny">
    <img src="LOGO-CULTURE.PNG" alt="Culture">
    <img src="LOGOBOY.png" alt="Partner">
  </div>

  <div class="bottom-note">
    espritducercle.ch
  </div>

</footer>

<script>
const images = document.querySelectorAll('.gallery img');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

images.forEach(img => observer.observe(img));
</script>

</body>
</html>
