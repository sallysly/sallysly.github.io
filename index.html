<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiss Dance Challenge</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f0f0f;
  color:white;
  text-align:center;
}

/* HEADER */
.header{
  padding:40px 20px 10px 20px;
}

.header img{
  height:90px;
  margin-bottom:15px;
}

.association{
  font-size:16px;
  letter-spacing:3px;
  color:#bdbdbd;
  margin-bottom:20px;
  text-transform:uppercase;
}

h1{
  margin:0;
  font-size:26px;
  letter-spacing:2px;
  text-transform:uppercase;
}

/* EVENT CARD */
.container{
  display:flex;
  flex-direction:column;
  gap:25px;
  align-items:center;
  padding:20px;
}

.card{
  width:100%;
  max-width:800px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 40px rgba(0,0,0,.6);
  transition:.3s ease;
}

.card:hover{
  transform:scale(1.02);
}

.card a{
  display:block;
  text-decoration:none;
  color:white;
}

.card img{
  width:100%;
  display:block;
}

.card-title{
  padding:18px;
  font-size:18px;
  font-weight:bold;
}

.manor{
  background:linear-gradient(45deg,#00b3ad,#008f8a);
}

.info-box{
  width:100%;
  max-width:800px;
  background:#181818;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:22px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  line-height:1.6;
  font-size:18px;
  color:white;
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:40px 20px 60px;
  background:#000;
}

footer h2{
  font-size:14px;
  letter-spacing:4px;
  margin-bottom:30px;
  color:#bdbdbd;
  text-transform:uppercase;
}

.sponsors{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:35px 45px;
}

.sponsors img{
  height:60px;
  max-width:180px;
  object-fit:contain;
  opacity:.85;
  transition:.3s ease;
}

.sponsors img:hover{
  opacity:1;
  transform:scale(1.08);
}

.bottom-note{
  margin-top:30px;
  font-size:12px;
  color:#888;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="header">
  <img src="LOGO-ESPRIT.PNG" alt="Association Esprit du Cercle">
  <div class="association">Association Esprit Du Cercle</div>
  <h1>WELCOME TO THE SWISS DANCE CHALLENGE</h1>
</div>

<div class="container">

  <div class="card manor">
    <a href="manor.html">
      <img src="IMG_6543.png" alt="Swiss Dance Challenge - Centres Manor">
      <div class="card-title">
        11 – 28 March 2026 • Centres Manor
      </div>
    </a>
  </div>

  <div class="info-box">
    Du au froid, nous faisons tout l’événement du 29 mars ce samedi 28 mars au Centre Manor dès 14h jusqu’à 17h.
  </div>

</div>

<footer>

  <h2>Official Partners</h2>

  <div class="sponsors">
    <img src="LOGO-LOTERIE.jpg" alt="Loterie Romande">
    <img src="Logo-Vevey-Ville.png" alt="Vevey Ville d'Images">
    <img src="LOGO-SION-CAPITAL.png" alt="Sion Capital">
    <img src="LOGO-DELEMONT.png" alt="Delémont">
    <img src="LOGO-NEUCHATEL.png" alt="Neuchâtel">
    <img src="logo-MARTIGNY.jpg" alt="Martigny">
    <img src="LOGO-CULTURE.PNG" alt="Culture">
    <img src="LOGOBOY.png" alt="Partner">
  </div>

  <div class="bottom-note">
    espritducercle.ch
  </div>

</footer>

</body>
</html>
